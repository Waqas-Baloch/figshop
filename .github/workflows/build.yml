# Builds the Figshop desktop installers on real runners and publishes a Release.
#
#  • workflow_dispatch → builds installers, uploads them as artifacts.
#  • push tag vX.Y.Z    → builds, then publishes ONE GitHub Release with both
#                         the macOS .dmg and Windows .exe attached.
#
# Each OS builds its own installer (cross-building isn't reliable). Publishing is
# done once in a separate job — no parallel-publish race, and a real (non-draft)
# release. Builds are unsigned unless you add the signing secrets:
#   macOS  : MAC_CSC_LINK, MAC_CSC_KEY_PASSWORD, APPLE_ID,
#            APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
#   Windows: WIN_CSC_LINK, WIN_CSC_KEY_PASSWORD
name: build-desktop

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            flag: mac
          - os: windows-latest
            flag: win
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    env:
      CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run dist:${{ matrix.flag }}
      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.flag }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.exe
          if-no-files-found: error # fail loudly if the installer wasn't produced

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: ls -R artifacts
      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Figshop ${GITHUB_REF_NAME}" \
            --notes "Figshop helper installers. macOS users: right-click ▸ Open the first time (unsigned). Windows users: More info ▸ Run anyway." \
            artifacts/installer-mac/*.dmg artifacts/installer-win/*.exe
